name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      DUCKLAKE_STORAGE: "s3://${{ vars.S3_BUCKET }}/zipcode"
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.13

      - run: uv sync

      - name: Pull catalog
        run: uv run fdl pull

      - name: Run pipeline
        run: uv run python pipeline.py

      - name: Generate metadata
        run: uv run fdl metadata

      - name: Push catalog
        if: always()
        run: uv run fdl push

      - name: Trigger catalog rebuild
        if: success()
        run: |
          gh api repos/flo8s/dataset-catalog/dispatches \
            -f event_type=dataset-updated \
            -f "client_payload[dataset]=zipcode"
        env:
          GH_TOKEN: ${{ secrets.CATALOG_TRIGGER_TOKEN }}

  notify-failure:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - name: Notify Discord on failure
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"Deploy Failed\", \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"color\": 15158332, \"fields\": [{\"name\": \"Repository\", \"value\": \"${{ github.repository }}\"}, {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\"}, {\"name\": \"Commit\", \"value\": \"${{ github.sha }}\"}]}]}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
